<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.bootcdn.net/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
        }
        :root {
            --primary: #007BFF;

            --primary-gradient: linear-gradient(135deg, #007BFF 0%, #00D1FF 100%);
            --dark: #0A1929;
            --dark-light: #11273D;
            --gray: #64748B;
            --white: #F8FAFC;

        body {

            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }
        /* 粒子背景 */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;

            height: 100%;
            z-index: 0;
            opacity: 0.6;
        }

            height: 80px;

            gap: 10px;
        }

            height: 40px;
            border-radius: 8px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: normal;
            font-size: 20px;
        }
        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        .nav-link {
            color: var(--white);
            text-decoration: none;
            font-size: 16px;
            position: relative;
            transition: var(--transition);
        }
        .nav-link:hover {
            color: var(--primary-light);
        }
        .nav-link::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-gradient);
            transition: var(--transition);
        }
        .nav-link:hover::after {
            width: 100%;
        }
        .hamburger {

            font-size: 24px;
            color: var(--white);
            cursor: pointer;
        }

        .qrcode-float-item p {

            margin-top: 5px;

        }

        .btn {

        .btn:hover {

        .intro-item li {

        }
        .intro-item li::before {

        }
        .ability-card {

            border: 1px solid rgba(0, 123, 255, 0.2);

        .ability-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
        .ability-card h3 {

            margin-bottom: 20px;
            color: var(--primary-light);

        .ability-card h3 i {

        .ability-card p, .ability-card ul {

            line-height: 1.8;
        }
        .ability-card ul {
            list-style: none;

        .ability-card li {
            position: relative;
            margin-bottom: 8px;
        }
        .ability-card li::before {
            content: "▸";

        }
        .course-tabs {

            justify-content: center;
            gap: 20px;

        }
        .course-tab {

            border: 1px solid rgba(0, 123, 255, 0.2);
            border-radius: 50px;
            color: var(--white);
            cursor: pointer;
            transition: var(--transition);
        }
        .course-tab.active, .course-tab:hover {
            background: var(--primary-gradient);

            box-shadow: var(--shadow);
        }
        .course-content {

            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 123, 255, 0.2);
            box-shadow: var(--shadow);
        }
        .course-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

        .course-item {

            border-radius: 10px;
            border: 1px solid rgba(0, 123, 255, 0.2);
            transition: var(--transition);
        }
        .course-item:hover {
            border-color: var(--primary);
            background-color: var(--dark-light);
        }
        .course-item h4 {

            margin-bottom: 10px;
            color: var(--primary-light);
        }
        .course-item p {
            font-size: 14px;
            color: var(--gray);
        }

            padding-bottom: 80px;

            width: 100%;
            height: 400px;
            margin-bottom: 60px;

            border: 1px solid rgba(0, 123, 255, 0.3);
            box-shadow: var(--shadow);
        }
        .view-swiper-item {
            width: 100%;
            height: 100%;
        }
        .view-swiper-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .view-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
